<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="800" height="380" fill="#0D1B2A"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#7B98B2" font-size="11" letter-spacing="3">RELEASE TIMELINE AND DISTRIBUTION</text>

  <!-- Timeline bar -->
  <rect x="80" y="180" width="640" height="4" fill="#1A3050" rx="2"/>
  <defs>
    <linearGradient id="tl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C9A7"/>
      <stop offset="100%" stop-color="#56CFE1"/>
    </linearGradient>
  </defs>
  <rect x="80" y="180" width="640" height="4" fill="url(#tl)" rx="2"/>

  <!-- Week markers -->
  <text x="80" y="205" text-anchor="middle" fill="#4A6580" font-size="10">DAY 1</text>
  <text x="400" y="205" text-anchor="middle" fill="#4A6580" font-size="10">DAY 7</text>
  <text x="720" y="205" text-anchor="middle" fill="#4A6580" font-size="10">DAY 14</text>

  <!-- Phase blocks -->
  <rect x="80" y="130" width="120" height="46" rx="4" fill="#112233" stroke="#00C9A7" stroke-width="1"/>
  <text x="140" y="150" text-anchor="middle" fill="#00C9A7" font-size="9" letter-spacing="1">IDEATION</text>
  <text x="140" y="165" text-anchor="middle" fill="#7B98B2" font-size="8">Scope + Arch</text>
  <line x1="140" y1="176" x2="140" y2="181" stroke="#00C9A7" stroke-width="1.5"/>

  <rect x="215" y="130" width="120" height="46" rx="4" fill="#112233" stroke="#56CFE1" stroke-width="1"/>
  <text x="275" y="150" text-anchor="middle" fill="#56CFE1" font-size="9" letter-spacing="1">DESIGN</text>
  <text x="275" y="165" text-anchor="middle" fill="#7B98B2" font-size="8">UX + Usability</text>
  <line x1="275" y1="176" x2="275" y2="181" stroke="#56CFE1" stroke-width="1.5"/>

  <rect x="350" y="130" width="140" height="46" rx="4" fill="#112233" stroke="#F4A261" stroke-width="1"/>
  <text x="420" y="150" text-anchor="middle" fill="#F4A261" font-size="9" letter-spacing="1">BUILD</text>
  <text x="420" y="165" text-anchor="middle" fill="#7B98B2" font-size="8">Eng + PM pair</text>
  <line x1="420" y1="176" x2="420" y2="181" stroke="#F4A261" stroke-width="1.5"/>

  <rect x="505" y="130" width="100" height="46" rx="4" fill="#112233" stroke="#56CFE1" stroke-width="1"/>
  <text x="555" y="150" text-anchor="middle" fill="#56CFE1" font-size="9" letter-spacing="1">TEST</text>
  <text x="555" y="165" text-anchor="middle" fill="#7B98B2" font-size="8">Beta customers</text>
  <line x1="555" y1="176" x2="555" y2="181" stroke="#56CFE1" stroke-width="1.5"/>

  <rect x="620" y="130" width="100" height="46" rx="4" fill="#00C9A7" stroke="#00C9A7" stroke-width="1"/>
  <text x="670" y="150" text-anchor="middle" fill="#0D1B2A" font-size="9" font-weight="bold" letter-spacing="1">SHIP</text>
  <text x="670" y="165" text-anchor="middle" fill="#0D1B2A" font-size="8">Production</text>
  <line x1="670" y1="176" x2="670" y2="181" stroke="#00C9A7" stroke-width="1.5"/>

  <!-- Role bars -->
  <rect x="80" y="228" width="640" height="22" rx="3" fill="#112233"/>
  <rect x="80" y="228" width="640" height="22" rx="3" fill="#00C9A7" opacity="0.12"/>
  <text x="88" y="243" fill="#00C9A7" font-size="10" font-weight="600">PM (Full-stack)</text>
  <text x="210" y="243" fill="#4A6580" font-size="9">Ideation → Arch → Scoping → Build (Cursor) → Testing → Release</text>

  <rect x="80" y="256" width="295" height="22" rx="3" fill="#112233"/>
  <rect x="80" y="256" width="295" height="22" rx="3" fill="#56CFE1" opacity="0.10"/>
  <text x="88" y="271" fill="#56CFE1" font-size="10" font-weight="600">Designer</text>
  <text x="160" y="271" fill="#4A6580" font-size="9">UX flows → Usability testing → UI</text>

  <rect x="385" y="256" width="335" height="22" rx="3" fill="#112233"/>
  <rect x="385" y="256" width="335" height="22" rx="3" fill="#F4A261" opacity="0.10"/>
  <text x="393" y="271" fill="#F4A261" font-size="10" font-weight="600">Engineer</text>
  <text x="455" y="271" fill="#4A6580" font-size="9">Backend infra → Review → Deploy</text>

  <!-- Sprint label -->
  <rect x="300" y="318" width="200" height="30" rx="15" fill="#1A3050" stroke="#00C9A7" stroke-width="1"/>
  <text x="400" y="338" text-anchor="middle" fill="#00C9A7" font-size="11" letter-spacing="1">⚡ 2-WEEK SPRINTS</text>
</svg>
