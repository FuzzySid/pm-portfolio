<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="800" height="300" fill="#0D1B2A"/>
  <text x="400" y="34" text-anchor="middle" fill="#7B98B2" font-size="11" letter-spacing="3">STORAGE TOPOLOGY — THREE LAYERS</text>

  <!-- SPA -->
  <rect x="40" y="100" width="130" height="60" rx="8" fill="#112233" stroke="#56CFE1" stroke-width="1.5"/>
  <text x="105" y="126" text-anchor="middle" fill="#56CFE1" font-size="9" letter-spacing="1">SINGLE PAGE APP</text>
  <text x="105" y="145" text-anchor="middle" fill="#7B98B2" font-size="9">Browser client</text>

  <!-- Arrow -->
  <line x1="172" y1="130" x2="210" y2="130" stroke="#00C9A7" stroke-width="1.5"/>
  <polygon points="208,124 220,130 208,136" fill="#00C9A7"/>
  <text x="191" y="122" text-anchor="middle" fill="#00C9A7" font-size="8">HTTP POST</text>

  <!-- Serverless Function -->
  <rect x="222" y="88" width="140" height="84" rx="8" fill="#112233" stroke="#00C9A7" stroke-width="2"/>
  <text x="292" y="120" text-anchor="middle" fill="#00C9A7" font-size="9" letter-spacing="1">SERVERLESS</text>
  <text x="292" y="136" text-anchor="middle" fill="#00C9A7" font-size="9" letter-spacing="1">FUNCTION</text>
  <text x="292" y="158" text-anchor="middle" fill="#4A6580" font-size="8">action-based routing</text>

  <!-- Arrows to storage -->
  <line x1="364" y1="112" x2="420" y2="78" stroke="#F4A261" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="416,71 428,75 420,85" fill="#F4A261"/>

  <line x1="364" y1="130" x2="420" y2="130" stroke="#56CFE1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="418,124 430,130 418,136" fill="#56CFE1"/>

  <line x1="364" y1="150" x2="420" y2="185" stroke="#00C9A7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="418,179 428,191 416,187" fill="#00C9A7"/>

  <!-- NoSQL -->
  <rect x="432" y="44" width="180" height="54" rx="6" fill="#112233" stroke="#F4A261" stroke-width="1.5"/>
  <text x="522" y="68" text-anchor="middle" fill="#F4A261" font-size="9" letter-spacing="1">NOSQL DATA STORE</text>
  <text x="522" y="87" text-anchor="middle" fill="#7B98B2" font-size="8">Conversation state · metadata</text>

  <!-- Cloud Storage -->
  <rect x="432" y="108" width="180" height="54" rx="6" fill="#112233" stroke="#56CFE1" stroke-width="1.5"/>
  <text x="522" y="132" text-anchor="middle" fill="#56CFE1" font-size="9" letter-spacing="1">CLOUD STORAGE</text>
  <text x="522" y="151" text-anchor="middle" fill="#7B98B2" font-size="8">messages · summarised_messages</text>

  <!-- Vector Store -->
  <rect x="432" y="172" width="180" height="54" rx="6" fill="#112233" stroke="#00C9A7" stroke-width="1.5"/>
  <text x="522" y="196" text-anchor="middle" fill="#00C9A7" font-size="9" letter-spacing="1">VECTOR STORE</text>
  <text x="522" y="215" text-anchor="middle" fill="#7B98B2" font-size="8">Transcript vectors · hybrid search</text>

  <!-- Arrow to LLM Gateway -->
  <line x1="614" y1="130" x2="652" y2="130" stroke="#7B98B2" stroke-width="1.5"/>
  <polygon points="650,124 662,130 650,136" fill="#7B98B2"/>

  <!-- LLM Gateway -->
  <rect x="664" y="90" width="110" height="80" rx="8" fill="#112233" stroke="#7B98B2" stroke-width="1.5"/>
  <text x="719" y="120" text-anchor="middle" fill="#7B98B2" font-size="9" letter-spacing="1">LLM</text>
  <text x="719" y="138" text-anchor="middle" fill="#7B98B2" font-size="9" letter-spacing="1">GATEWAY</text>
  <text x="719" y="158" text-anchor="middle" fill="#4A6580" font-size="8">routing · fallback</text>

  <!-- Layer labels -->
  <text x="522" y="258" text-anchor="middle" fill="#4A6580" font-size="9" letter-spacing="1">LAYER 1: STATE    ·    LAYER 2: HISTORY    ·    LAYER 3: SEARCH</text>
</svg>
