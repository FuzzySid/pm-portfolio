<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="800" height="380" fill="#0D1B2A"/>
  <text x="400" y="30" text-anchor="middle" fill="#7B98B2" font-size="11" letter-spacing="3">FIVE-STEP CITATION PIPELINE</text>

  <!-- Raw AI output -->
  <rect x="40" y="52" width="720" height="32" rx="5" fill="#0A1628" stroke="#1A3050" stroke-width="1"/>
  <text x="60" y="66" fill="#4A6580" font-family="'Courier New', monospace" font-size="9">RAW AI OUTPUT: </text>
  <text x="155" y="66" fill="#E8F0F5" font-family="'Courier New', monospace" font-size="9">"&lt;CITATION&gt;Users struggled with onboarding&lt;/CITATION&gt;, especially during setup."</text>
  <line x1="400" y1="84" x2="400" y2="104" stroke="#00C9A7" stroke-width="1.5"/>
  <polygon points="394,102 400,114 406,102" fill="#00C9A7"/>

  <!-- Steps row -->
  <!-- Step 1 -->
  <rect x="30" y="116" width="130" height="130" rx="8" fill="#112233" stroke="#00C9A7" stroke-width="1.5"/>
  <circle cx="95" cy="142" r="16" fill="#00C9A7"/>
  <text x="95" y="147" text-anchor="middle" fill="#0D1B2A" font-size="13" font-weight="bold">1</text>
  <text x="95" y="172" text-anchor="middle" fill="#00C9A7" font-size="10" font-weight="600">EXTRACT</text>
  <text x="95" y="190" text-anchor="middle" fill="#7B98B2" font-size="8">Regex pulls</text>
  <text x="95" y="204" text-anchor="middle" fill="#7B98B2" font-size="8">&lt;CITATION&gt; spans</text>
  <text x="95" y="218" text-anchor="middle" fill="#7B98B2" font-size="8">into structured list</text>

  <line x1="162" y1="181" x2="182" y2="181" stroke="#00C9A7" stroke-width="1.5"/>
  <polygon points="180,175 192,181 180,187" fill="#00C9A7"/>

  <!-- Step 2 -->
  <rect x="194" y="116" width="130" height="130" rx="8" fill="#112233" stroke="#56CFE1" stroke-width="1.5"/>
  <circle cx="259" cy="142" r="16" fill="#56CFE1"/>
  <text x="259" y="147" text-anchor="middle" fill="#0D1B2A" font-size="13" font-weight="bold">2</text>
  <text x="259" y="172" text-anchor="middle" fill="#56CFE1" font-size="10" font-weight="600">SEARCH</text>
  <text x="259" y="190" text-anchor="middle" fill="#7B98B2" font-size="8">Hybrid vector +</text>
  <text x="259" y="204" text-anchor="middle" fill="#7B98B2" font-size="8">keyword search.</text>
  <text x="259" y="218" text-anchor="middle" fill="#7B98B2" font-size="8">Top 15 results</text>

  <line x1="326" y1="181" x2="346" y2="181" stroke="#00C9A7" stroke-width="1.5"/>
  <polygon points="344,175 356,181 344,187" fill="#00C9A7"/>

  <!-- Step 3 -->
  <rect x="358" y="116" width="130" height="130" rx="8" fill="#112233" stroke="#F4A261" stroke-width="1.5"/>
  <circle cx="423" cy="142" r="16" fill="#F4A261"/>
  <text x="423" y="147" text-anchor="middle" fill="#0D1B2A" font-size="13" font-weight="bold">3</text>
  <text x="423" y="172" text-anchor="middle" fill="#F4A261" font-size="10" font-weight="600">VALIDATE</text>
  <text x="423" y="190" text-anchor="middle" fill="#7B98B2" font-size="8">2nd LLM call</text>
  <text x="423" y="204" text-anchor="middle" fill="#7B98B2" font-size="8">fact-checks claim</text>
  <text x="423" y="218" text-anchor="middle" fill="#7B98B2" font-size="8">+ extracts quote</text>

  <line x1="490" y1="181" x2="510" y2="181" stroke="#00C9A7" stroke-width="1.5"/>
  <polygon points="508,175 520,181 508,187" fill="#00C9A7"/>

  <!-- Step 4 -->
  <rect x="522" y="116" width="120" height="130" rx="8" fill="#112233" stroke="#56CFE1" stroke-width="1.5"/>
  <circle cx="582" cy="142" r="16" fill="#56CFE1"/>
  <text x="582" y="147" text-anchor="middle" fill="#0D1B2A" font-size="13" font-weight="bold">4</text>
  <text x="582" y="172" text-anchor="middle" fill="#56CFE1" font-size="10" font-weight="600">GROUP</text>
  <text x="582" y="190" text-anchor="middle" fill="#7B98B2" font-size="8">Organize by</text>
  <text x="582" y="204" text-anchor="middle" fill="#7B98B2" font-size="8">transcript ID,</text>
  <text x="582" y="218" text-anchor="middle" fill="#7B98B2" font-size="8">speaker, file</text>

  <line x1="644" y1="181" x2="662" y2="181" stroke="#00C9A7" stroke-width="1.5"/>
  <polygon points="660,175 672,181 660,187" fill="#00C9A7"/>

  <!-- Step 5 -->
  <rect x="674" y="116" width="100" height="130" rx="8" fill="#00C9A7"/>
  <circle cx="724" cy="142" r="16" fill="#0D1B2A"/>
  <text x="724" y="147" text-anchor="middle" fill="#00C9A7" font-size="13" font-weight="bold">5</text>
  <text x="724" y="172" text-anchor="middle" fill="#0D1B2A" font-size="10" font-weight="bold">ATTACH</text>
  <text x="724" y="190" text-anchor="middle" fill="#0D1B2A" font-size="8">Strip tags,</text>
  <text x="724" y="204" text-anchor="middle" fill="#0D1B2A" font-size="8">attach citation</text>
  <text x="724" y="218" text-anchor="middle" fill="#0D1B2A" font-size="8">map to response</text>

  <!-- Line to output -->
  <line x1="400" y1="248" x2="400" y2="268" stroke="#00C9A7" stroke-width="1.5"/>
  <polygon points="394,266 400,278 406,266" fill="#00C9A7"/>

  <!-- Clean output -->
  <rect x="40" y="280" width="720" height="32" rx="5" fill="#0A1628" stroke="#00C9A7" stroke-width="1"/>
  <text x="60" y="295" fill="#4A6580" font-family="'Courier New', monospace" font-size="9">CLEAN OUTPUT: </text>
  <text x="148" y="295" fill="#E8F0F5" font-family="'Courier New', monospace" font-size="9">"Users struggled with onboarding"</text>
  <rect x="366" y="285" width="14" height="14" rx="3" fill="#00C9A7"/>
  <text x="373" y="296" text-anchor="middle" fill="#0D1B2A" font-size="8" font-weight="bold">1</text>
  <text x="388" y="295" fill="#7B98B2" font-family="'Courier New', monospace" font-size="9">, especially during setup.  ← clickable, maps to timestamp 14:32</text>

  <text x="400" y="348" text-anchor="middle" fill="#4A6580" font-size="9">Pipeline runs on EVERY AI response — initial analysis and all follow-up answers</text>
</svg>
