<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="800" height="360" fill="#0D1B2A"/>
  <text x="400" y="34" text-anchor="middle" fill="#7B98B2" font-size="11" letter-spacing="3">THE TRUST PROBLEM WITH AI-GENERATED OUTPUT</text>

  <!-- Left: without citations -->
  <rect x="40" y="65" width="320" height="230" rx="8" fill="#112233" stroke="#F4A261" stroke-width="1.5"/>
  <text x="200" y="90" text-anchor="middle" fill="#F4A261" font-size="10" letter-spacing="1">WITHOUT CITATIONS</text>

  <!-- AI output box -->
  <rect x="60" y="105" width="280" height="80" rx="5" fill="#1A3050"/>
  <text x="200" y="128" text-anchor="middle" fill="#E8F0F5" font-size="9">"Users frequently complained</text>
  <text x="200" y="144" text-anchor="middle" fill="#E8F0F5" font-size="9">about the onboarding flow and</text>
  <text x="200" y="160" text-anchor="middle" fill="#E8F0F5" font-size="9">said it took too long to set up."</text>

  <!-- Question mark -->
  <text x="200" y="222" text-anchor="middle" fill="#F4A261" font-size="48">?</text>
  <text x="200" y="274" text-anchor="middle" fill="#F4A261" font-size="10">Is this accurate? Can I trust it?</text>
  <text x="200" y="288" text-anchor="middle" fill="#7B98B2" font-size="9">No way to verify. Could be hallucinated.</text>

  <!-- Right: with citations -->
  <rect x="440" y="65" width="320" height="230" rx="8" fill="#112233" stroke="#00C9A7" stroke-width="1.5"/>
  <text x="600" y="90" text-anchor="middle" fill="#00C9A7" font-size="10" letter-spacing="1">WITH CITATIONS</text>

  <!-- AI output with citation markers -->
  <rect x="460" y="105" width="280" height="80" rx="5" fill="#1A3050"/>
  <text x="600" y="128" text-anchor="middle" fill="#E8F0F5" font-size="9">"Users frequently complained</text>
  <text x="600" y="144" text-anchor="middle" fill="#E8F0F5" font-size="9">about the onboarding flow</text>
  <rect x="665" y="134" width="14" height="14" rx="3" fill="#00C9A7"/>
  <text x="672" y="145" text-anchor="middle" fill="#0D1B2A" font-size="8" font-weight="bold">1</text>
  <text x="600" y="162" text-anchor="middle" fill="#E8F0F5" font-size="9">and said it took too long.</text>
  <rect x="650" y="152" width="14" height="14" rx="3" fill="#00C9A7"/>
  <text x="657" y="163" text-anchor="middle" fill="#0D1B2A" font-size="8" font-weight="bold">2</text>

  <!-- Citation boxes -->
  <rect x="460" y="196" width="280" height="30" rx="4" fill="#0A1628" stroke="#00C9A7" stroke-width="1"/>
  <rect x="467" y="202" width="14" height="14" rx="3" fill="#00C9A7"/>
  <text x="476" y="213" text-anchor="middle" fill="#0D1B2A" font-size="7" font-weight="bold">1</text>
  <text x="490" y="213" fill="#7B98B2" font-size="8">Interview with Sarah K. — 14:32  →  Jump to file</text>

  <rect x="460" y="230" width="280" height="30" rx="4" fill="#0A1628" stroke="#00C9A7" stroke-width="1"/>
  <rect x="467" y="236" width="14" height="14" rx="3" fill="#00C9A7"/>
  <text x="476" y="247" text-anchor="middle" fill="#0D1B2A" font-size="7" font-weight="bold">2</text>
  <text x="490" y="247" fill="#7B98B2" font-size="8">Interview with Marcus T. — 8:47  →  Jump to file</text>

  <text x="600" y="284" text-anchor="middle" fill="#00C9A7" font-size="10">Traceable. Verifiable. Trustworthy.</text>

  <!-- Arrow between panels -->
  <text x="400" y="188" text-anchor="middle" fill="#00C9A7" font-size="24">→</text>
  <text x="400" y="210" text-anchor="middle" fill="#00C9A7" font-size="8" letter-spacing="1">V2 ADDS</text>
  <text x="400" y="222" text-anchor="middle" fill="#00C9A7" font-size="8" letter-spacing="1">CITATIONS</text>

  <!-- Bottom principle -->
  <text x="400" y="322" text-anchor="middle" fill="#4A6580" font-size="10" font-style="italic">Visibility drives trust. Not because hallucinations are impossible — but because the source is always traceable.</text>
</svg>
