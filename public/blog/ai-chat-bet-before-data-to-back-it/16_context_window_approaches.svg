<svg viewBox="0 0 800 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="800" height="440" fill="#0D1B2A"/>
  <text x="400" y="30" text-anchor="middle" fill="#7B98B2" font-size="11" letter-spacing="3">POPULAR APPROACHES TO CONTEXT WINDOW LIMITS</text>

  <!-- Approach 1: Hard cap -->
  <rect x="30" y="55" width="170" height="210" rx="8" fill="#112233" stroke="#4A6580" stroke-width="1.5"/>
  <text x="115" y="80" text-anchor="middle" fill="#4A6580" font-size="9" letter-spacing="1">HARD CAP</text>
  <rect x="50" y="92" width="130" height="12" rx="3" fill="#1A3050"/>
  <rect x="50" y="110" width="130" height="12" rx="3" fill="#1A3050"/>
  <rect x="50" y="128" width="130" height="12" rx="3" fill="#1A3050"/>
  <rect x="50" y="146" width="130" height="12" rx="3" fill="#1A3050"/>
  <rect x="50" y="164" width="130" height="12" rx="3" fill="#1A3050"/>
  <line x1="50" y1="183" x2="180" y2="183" stroke="#F44" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="115" y="197" text-anchor="middle" fill="#F44" font-size="9">STOP HERE</text>
  <text x="115" y="220" text-anchor="middle" fill="#4A6580" font-size="8">Simple to implement.</text>
  <text x="115" y="236" text-anchor="middle" fill="#4A6580" font-size="8">Abrupt for users.</text>
  <text x="115" y="252" text-anchor="middle" fill="#4A6580" font-size="8">V1 approach.</text>

  <!-- Approach 2: Rolling window -->
  <rect x="215" y="55" width="170" height="210" rx="8" fill="#112233" stroke="#4A6580" stroke-width="1.5"/>
  <text x="300" y="80" text-anchor="middle" fill="#4A6580" font-size="9" letter-spacing="1">ROLLING WINDOW</text>
  <rect x="235" y="92" width="130" height="12" rx="3" fill="#1A3050" opacity="0.4"/>
  <rect x="235" y="110" width="130" height="12" rx="3" fill="#1A3050" opacity="0.4"/>
  <line x1="235" y1="128" x2="365" y2="128" stroke="#4A6580" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="235" y="134" width="130" height="12" rx="3" fill="#1A3050"/>
  <rect x="235" y="152" width="130" height="12" rx="3" fill="#1A3050"/>
  <rect x="235" y="170" width="130" height="12" rx="3" fill="#1A3050"/>
  <text x="280" y="105" fill="#4A6580" font-size="8" font-style="italic">← discarded</text>
  <text x="300" y="210" text-anchor="middle" fill="#4A6580" font-size="8">Last N messages kept.</text>
  <text x="300" y="226" text-anchor="middle" fill="#4A6580" font-size="8">Loses early context.</text>
  <text x="300" y="242" text-anchor="middle" fill="#4A6580" font-size="8">Unpredictably lossy.</text>

  <!-- Approach 3: RAG -->
  <rect x="400" y="55" width="170" height="210" rx="8" fill="#112233" stroke="#4A6580" stroke-width="1.5"/>
  <text x="485" y="80" text-anchor="middle" fill="#4A6580" font-size="9" letter-spacing="1">RAG RETRIEVAL</text>
  <rect x="420" y="95" width="130" height="50" rx="4" fill="#1A3050"/>
  <text x="485" y="118" text-anchor="middle" fill="#4A6580" font-size="8">Vector DB of</text>
  <text x="485" y="132" text-anchor="middle" fill="#4A6580" font-size="8">past messages</text>
  <line x1="485" y1="148" x2="485" y2="162" stroke="#4A6580" stroke-width="1"/>
  <polygon points="479,160 485,172 491,160" fill="#4A6580"/>
  <text x="485" y="190" text-anchor="middle" fill="#4A6580" font-size="8">Retrieve relevant</text>
  <text x="485" y="205" text-anchor="middle" fill="#4A6580" font-size="8">history on demand.</text>
  <text x="485" y="222" text-anchor="middle" fill="#4A6580" font-size="8">Complex to build.</text>
  <text x="485" y="238" text-anchor="middle" fill="#4A6580" font-size="8">Relevance is tricky.</text>

  <!-- Approach 4: COMPRESSION — highlighted -->
  <rect x="585" y="45" width="185" height="220" rx="8" fill="#112233" stroke="#00C9A7" stroke-width="2"/>
  <rect x="585" y="45" width="185" height="28" rx="8" fill="#00C9A7"/>
  <text x="677" y="63" text-anchor="middle" fill="#0D1B2A" font-size="9" letter-spacing="1" font-weight="bold">COMPRESSION ← OUR CHOICE</text>

  <!-- Visual of compression -->
  <rect x="605" y="84" width="145" height="10" rx="2" fill="#1A3050"/>
  <rect x="605" y="100" width="145" height="10" rx="2" fill="#1A3050"/>
  <rect x="605" y="116" width="145" height="10" rx="2" fill="#1A3050"/>
  <rect x="605" y="132" width="145" height="10" rx="2" fill="#1A3050"/>
  <line x1="660" y1="148" x2="660" y2="162" stroke="#00C9A7" stroke-width="1.5"/>
  <text x="700" y="157" fill="#00C9A7" font-size="8">LLM summarise</text>
  <polygon points="654,160 660,172 666,160" fill="#00C9A7"/>
  <rect x="620" y="174" width="110" height="22" rx="4" fill="#00C9A7" opacity="0.2" stroke="#00C9A7" stroke-width="1"/>
  <text x="675" y="189" text-anchor="middle" fill="#00C9A7" font-size="8" font-weight="600">condensed summary</text>

  <text x="677" y="218" text-anchor="middle" fill="#00C9A7" font-size="8">Full fidelity distilled.</text>
  <text x="677" y="233" text-anchor="middle" fill="#00C9A7" font-size="8">Elegant, scalable.</text>

  <!-- Bottom: comparison row -->
  <rect x="30" y="285" width="740" height="52" rx="6" fill="#112233"/>
  <text x="115" y="306" text-anchor="middle" fill="#4A6580" font-size="8">Simple / abrupt</text>
  <text x="115" y="322" text-anchor="middle" fill="#4A6580" font-size="8">❌ No continuity</text>
  <text x="300" y="306" text-anchor="middle" fill="#4A6580" font-size="8">Keeps recency</text>
  <text x="300" y="322" text-anchor="middle" fill="#4A6580" font-size="8">❌ Loses early context</text>
  <text x="485" y="306" text-anchor="middle" fill="#4A6580" font-size="8">Smart retrieval</text>
  <text x="485" y="322" text-anchor="middle" fill="#4A6580" font-size="8">❌ Complex build</text>
  <text x="677" y="306" text-anchor="middle" fill="#00C9A7" font-size="8">Distilled history</text>
  <text x="677" y="322" text-anchor="middle" fill="#00C9A7" font-size="8">✓ Elegant + scalable</text>

  <!-- Vertical dividers in comparison -->
  <line x1="205" y1="285" x2="205" y2="337" stroke="#1A3050" stroke-width="1"/>
  <line x1="390" y1="285" x2="390" y2="337" stroke="#1A3050" stroke-width="1"/>
  <line x1="575" y1="285" x2="575" y2="337" stroke="#1A3050" stroke-width="1"/>

  <text x="400" y="378" text-anchor="middle" fill="#4A6580" font-size="9" font-style="italic">We chose compression: you're not throwing history away, you're distilling it.</text>
</svg>
