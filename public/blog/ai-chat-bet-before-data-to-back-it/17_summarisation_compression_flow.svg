<svg viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="800" height="520" fill="#0D1B2A"/>
  <text x="400" y="30" text-anchor="middle" fill="#7B98B2" font-size="11" letter-spacing="3">HOW CONVERSATION SUMMARISATION WORKS</text>

  <!-- Full history stack -->
  <text x="140" y="58" text-anchor="middle" fill="#7B98B2" font-size="10" letter-spacing="1">FULL HISTORY (messages.json)</text>

  <rect x="40" y="68" width="200" height="22" rx="3" fill="#1A3050"/>
  <text x="140" y="83" text-anchor="middle" fill="#56CFE1" font-size="8">system_prompt</text>

  <rect x="40" y="95" width="200" height="22" rx="3" fill="#1A3050"/>
  <text x="140" y="110" text-anchor="middle" fill="#56CFE1" font-size="8">transcript_context (20 interviews)</text>

  <rect x="40" y="122" width="200" height="22" rx="3" fill="#1A3050"/>
  <text x="140" y="137" text-anchor="middle" fill="#F4A261" font-size="8">initial_AI_response</text>

  <rect x="40" y="149" width="200" height="16" rx="3" fill="#1A3050" opacity="0.8"/>
  <text x="140" y="161" text-anchor="middle" fill="#7B98B2" font-size="7">user Q1  +  AI answer 1</text>

  <rect x="40" y="170" width="200" height="16" rx="3" fill="#1A3050" opacity="0.7"/>
  <text x="140" y="182" text-anchor="middle" fill="#7B98B2" font-size="7">user Q2  +  AI answer 2</text>

  <rect x="40" y="191" width="200" height="16" rx="3" fill="#1A3050" opacity="0.6"/>
  <text x="140" y="203" text-anchor="middle" fill="#7B98B2" font-size="7">user Q3  +  AI answer 3</text>

  <rect x="40" y="212" width="200" height="16" rx="3" fill="#1A3050" opacity="0.5"/>
  <text x="140" y="224" text-anchor="middle" fill="#4A6580" font-size="7">... more Q&amp;A pairs ...</text>

  <!-- Token gauge - taller with full label visible -->
  <rect x="40" y="242" width="200" height="20" rx="3" fill="#1A3050"/>
  <rect x="40" y="242" width="200" height="20" rx="3" fill="#F4A261" opacity="0.8"/>
  <text x="140" y="256" text-anchor="middle" fill="#0D1B2A" font-size="8" font-weight="600">token usage &lt; 50% remaining → TRIGGER</text>

  <!-- Connector to process -->
  <line x1="242" y1="178" x2="290" y2="178" stroke="#00C9A7" stroke-width="1.5"/>
  <polygon points="288,172 300,178 288,184" fill="#00C9A7"/>
  <text x="266" y="168" text-anchor="middle" fill="#00C9A7" font-size="8">compress</text>

  <!-- Middle: LLM summarise step -->
  <rect x="302" y="128" width="170" height="140" rx="8" fill="#112233" stroke="#00C9A7" stroke-width="2"/>
  <text x="387" y="158" text-anchor="middle" fill="#00C9A7" font-size="9" letter-spacing="1">SUMMARISE</text>

  <rect x="318" y="168" width="138" height="16" rx="3" fill="#1A3050"/>
  <text x="387" y="180" text-anchor="middle" fill="#56CFE1" font-size="7">① Keep: system + context + init</text>
  <rect x="318" y="189" width="138" height="16" rx="3" fill="#1A3050"/>
  <text x="387" y="201" text-anchor="middle" fill="#7B98B2" font-size="7">② Flatten Q&amp;A pairs to list</text>
  <rect x="318" y="210" width="138" height="16" rx="3" fill="#1A3050"/>
  <text x="387" y="222" text-anchor="middle" fill="#7B98B2" font-size="7">③ LLM → prose summary</text>
  <rect x="318" y="231" width="138" height="16" rx="3" fill="#00C9A7" opacity="0.2"/>
  <text x="387" y="243" text-anchor="middle" fill="#00C9A7" font-size="7">④ Assemble compressed array</text>

  <!-- Arrow to compressed output -->
  <line x1="474" y1="198" x2="514" y2="198" stroke="#00C9A7" stroke-width="1.5"/>
  <polygon points="512,192 524,198 512,204" fill="#00C9A7"/>

  <!-- Compressed: summarised_messages.json -->
  <text x="652" y="58" text-anchor="middle" fill="#00C9A7" font-size="10" letter-spacing="1">COMPRESSED (summarised_messages.json)</text>

  <rect x="526" y="68" width="245" height="22" rx="3" fill="#1A3050"/>
  <text x="648" y="83" text-anchor="middle" fill="#56CFE1" font-size="8">system_prompt</text>

  <rect x="526" y="95" width="245" height="22" rx="3" fill="#1A3050"/>
  <text x="648" y="110" text-anchor="middle" fill="#56CFE1" font-size="8">transcript_context</text>

  <rect x="526" y="122" width="245" height="40" rx="3" fill="#1A3050" stroke="#00C9A7" stroke-width="1"/>
  <text x="648" y="140" text-anchor="middle" fill="#00C9A7" font-size="8" font-weight="600">summary_message</text>
  <text x="648" y="156" text-anchor="middle" fill="#7B98B2" font-size="7">LLM prose of all prior Q&amp;A</text>

  <rect x="526" y="167" width="245" height="22" rx="3" fill="#1A3050"/>
  <text x="648" y="182" text-anchor="middle" fill="#F4A261" font-size="8">current_user_message</text>

  <rect x="526" y="198" width="245" height="34" rx="4" fill="#0A1628" stroke="#1A3050" stroke-width="1"/>
  <text x="648" y="213" text-anchor="middle" fill="#4A6580" font-size="8">messages.json — NEVER modified</text>
  <text x="648" y="227" text-anchor="middle" fill="#4A6580" font-size="8">Always the full historical record</text>

  <!-- Threshold diagram -->
  <text x="400" y="310" text-anchor="middle" fill="#7B98B2" font-size="10" letter-spacing="1">COMPRESSION THRESHOLD — WHY 50%?</text>

  <rect x="40" y="326" width="340" height="116" rx="8" fill="#112233" stroke="#1A3050" stroke-width="1"/>
  <rect x="60" y="342" width="300" height="22" rx="4" fill="#1A3050"/>
  <rect x="60" y="342" width="150" height="22" rx="4" fill="#00C9A7" opacity="0.7"/>
  <text x="135" y="357" text-anchor="middle" fill="#0D1B2A" font-size="8" font-weight="bold">used</text>
  <text x="285" y="357" text-anchor="middle" fill="#7B98B2" font-size="8">headroom</text>
  <text x="210" y="357" fill="#00C9A7" font-size="10">|</text>
  <text x="210" y="380" text-anchor="middle" fill="#00C9A7" font-size="9">50% — trigger point</text>
  <text x="210" y="398" text-anchor="middle" fill="#4A6580" font-size="8">Conservative by design:</text>
  <text x="210" y="414" text-anchor="middle" fill="#4A6580" font-size="8">model needs headroom to summarise well</text>
  <text x="210" y="430" text-anchor="middle" fill="#4A6580" font-size="8">A summary under pressure is a worse summary</text>

  <!-- Lossy cycle diagram -->
  <rect x="420" y="326" width="355" height="116" rx="8" fill="#112233" stroke="#F4A261" stroke-width="1"/>
  <text x="597" y="350" text-anchor="middle" fill="#F4A261" font-size="9" letter-spacing="1">COMPRESSION IS LOSSY</text>
  <text x="597" y="372" text-anchor="middle" fill="#7B98B2" font-size="8">Each cycle abstracts exact phrasing</text>
  <text x="597" y="388" text-anchor="middle" fill="#7B98B2" font-size="8">and per-message citations into prose.</text>
  <text x="597" y="406" text-anchor="middle" fill="#4A6580" font-size="8">Summarising a summary compounds over time.</text>
  <text x="597" y="424" text-anchor="middle" fill="#4A6580" font-size="8">Acceptable for research synthesis.</text>
  <text x="597" y="440" text-anchor="middle" fill="#4A6580" font-size="8">No user ever hit this ceiling.</text>
</svg>
