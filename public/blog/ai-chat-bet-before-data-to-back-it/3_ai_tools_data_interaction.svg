<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="800" height="380" fill="#0D1B2A"/>
  <text x="400" y="36" text-anchor="middle" fill="#7B98B2" font-size="11" letter-spacing="3">NEW MENTAL MODEL</text>

  <!-- Old model -->
  <rect x="60" y="60" width="210" height="240" rx="8" fill="#112233" stroke="#1A3050" stroke-width="1.5"/>
  <text x="165" y="85" text-anchor="middle" fill="#4A6580" font-size="10" letter-spacing="2">BEFORE 2024</text>
  <rect x="100" y="100" width="130" height="16" rx="3" fill="#1A3050"/>
  <rect x="100" y="122" width="130" height="16" rx="3" fill="#1A3050"/>
  <rect x="100" y="144" width="130" height="16" rx="3" fill="#1A3050"/>
  <rect x="100" y="166" width="130" height="16" rx="3" fill="#1A3050"/>
  <text x="165" y="112" text-anchor="middle" fill="#4A6580" font-size="9">Interview recording</text>
  <text x="165" y="134" text-anchor="middle" fill="#4A6580" font-size="9">Transcript doc</text>
  <text x="165" y="156" text-anchor="middle" fill="#4A6580" font-size="9">Spreadsheet</text>
  <text x="165" y="178" text-anchor="middle" fill="#4A6580" font-size="9">Affinity diagram</text>
  <text x="165" y="218" text-anchor="middle" fill="#4A6580" font-size="28">↓</text>
  <text x="165" y="255" text-anchor="middle" fill="#4A6580" font-size="11">Read everything manually</text>
  <text x="165" y="272" text-anchor="middle" fill="#4A6580" font-size="11">Synthesize yourself</text>
  <text x="165" y="295" text-anchor="middle" fill="#4A6580" font-size="10" font-style="italic">Hours → Days</text>

  <!-- Center arrow -->
  <text x="400" y="195" text-anchor="middle" fill="#00C9A7" font-size="32">→</text>
  <text x="400" y="220" text-anchor="middle" fill="#00C9A7" font-size="9" letter-spacing="1">AI SHIFT</text>

  <!-- New model -->
  <rect x="530" y="60" width="210" height="240" rx="8" fill="#112233" stroke="#00C9A7" stroke-width="1.5"/>
  <text x="635" y="85" text-anchor="middle" fill="#00C9A7" font-size="10" letter-spacing="2">AFTER 2024</text>

  <!-- Data pile -->
  <rect x="565" y="100" width="140" height="60" rx="5" fill="#1A3050" stroke="#00C9A7" stroke-width="1"/>
  <text x="635" y="125" text-anchor="middle" fill="#7B98B2" font-size="9">PDFs · Transcripts</text>
  <text x="635" y="142" text-anchor="middle" fill="#7B98B2" font-size="9">Recordings · Notes</text>

  <!-- Arrow down -->
  <line x1="635" y1="163" x2="635" y2="178" stroke="#00C9A7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="629,178 635,190 641,178" fill="#00C9A7"/>

  <!-- Chat bubble — wider with more horizontal padding -->
  <rect x="548" y="193" width="174" height="46" rx="23" fill="#00C9A7"/>
  <text x="635" y="212" text-anchor="middle" fill="#0D1B2A" font-size="9" font-weight="bold">"What did users</text>
  <text x="635" y="228" text-anchor="middle" fill="#0D1B2A" font-size="9" font-weight="bold">say about X?"</text>

  <!-- Response bubble -->
  <rect x="565" y="248" width="140" height="36" rx="5" fill="#1A3050" stroke="#00C9A7" stroke-width="1"/>
  <text x="635" y="266" text-anchor="middle" fill="#00C9A7" font-size="9">Answer + citations</text>
  <text x="635" y="280" text-anchor="middle" fill="#7B98B2" font-size="9">traced to source</text>

  <text x="635" y="295" text-anchor="middle" fill="#00C9A7" font-size="10" font-style="italic">Seconds</text>

  <!-- Tools label -->
  <text x="400" y="340" text-anchor="middle" fill="#4A6580" font-size="10">Popularised by ChatGPT · Claude · NotebookLM</text>
</svg>
